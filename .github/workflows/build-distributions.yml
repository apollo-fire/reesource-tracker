---
name: Build and Distribute Sample Tracker
run-name: Build and Distribute Sample Tracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Build Frontend
        run: |
          cd client
          bun install
          bun run build --emptyOutDir
      - name: Upload Frontend Build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-build
          path: build/client/**

  build-linux:
    name: Build Linux
    needs: build-client
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Download Frontend Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-build
          path: build/client
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
      - name: Build Linux binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/reesource-tracker ./main.go
      - name: Remove existing build/database directory
        run: rm -rf build/database
      - name: Create build/database directory
        run: mkdir -p build/database
      - name: Copy migrations
        run: cp -r database/migrations build/migrations
      - name: Upload Linux binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reesource-tracker-linux
          path: build/**

  build-windows:
    name: Build Windows
    needs: build-client
    runs-on: windows-latest
    permissions:
      # Required to checkout the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Download Frontend Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-build
          path: build/client
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Build Windows binary
        run: |
          $env:GOOS='windows'
          $env:GOARCH='amd64'
          go build -o build/reesource-tracker.exe ./main.go
      - name: Remove existing build/database directory
        run: if (Test-Path "build/database") { Remove-Item -Recurse -Force "build/database" }
      - name: Create build/database directory
        run: mkdir build/database
      - name: Copy migrations
        run: Copy-Item -Recurse -Force database/migrations build/migrations
      - name: Upload Windows binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reesource-tracker-windows
          path: build/**

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: build-client
    permissions:
      contents: read # Required to checkout the repository
      packages: write # Required to push images to GitHub Container Registry
      id-token: write # Required for OIDC token signing
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Download Frontend Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-build
          path: client_built
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        if: github.ref == 'refs/heads/main'
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ format('ghcr.io/{0}/reesource-tracker:latest', github.repository) }}
