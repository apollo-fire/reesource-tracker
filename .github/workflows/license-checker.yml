---
# License Checker Workflow
# Compatibility checks available at:
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/GPL-3.0-only/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/LGPL-3.0-only/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/MIT/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/0BSD/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/BSD-3-Clause-Clear/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/BSD-3-Clause/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/BSD-2-Clause/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/Apache-2.0/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/ISC/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/MPL-2.0/GPL-3.0-only
# * https://interoperable-europe.ec.europa.eu/licence/compatibility-check/CC0-1.0/GPL-3.0-only
# Source for remaining licenses:
# * Python: https://spdx.org/licenses/Python-2.0.html
# * BlueOak: https://spdx.org/licenses/BlueOak-1.0.0.html

name: License Checker
run-name: License Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  gather-go-licenses:
    name: Gather Go Licenses
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Install go-licenses
        run: go get -tool github.com/google/go-licenses/v2@latest

      - name: Install go dependencies
        run: go mod tidy

      - name: Generate Go license report
        run: |
          go tool go-licenses report . > go-licenses.csv
        continue-on-error: true

      - name: Upload Go license report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-licenses-report
          path: go-licenses.csv

  gather-npm-licenses:
    name: Gather NPM Licenses
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install license-checker
        run: bun install -g license-checker
      - name: Install npm dependencies
        run: bun install
      - name: Generate npm license report (CSV)
        run: license-checker --csv --excludePrivatePackages --out npm-licenses.csv
        continue-on-error: true
      - name: Upload npm license report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-licenses-report
          path: client/npm-licenses.csv

  check-license-compatibility:
    name: Check License Compatibility
    runs-on: ubuntu-latest
    needs: [gather-go-licenses, gather-npm-licenses]
    permissions:
      # Required to checkout the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download Go license report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-licenses-report
      - name: Download npm license report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-licenses-report
      - name: Install yq
        run: |
          wget -qO "/usr/local/bin/yq" "https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
      - name: Check license compatibility
        env:
          COMPATIBLE_LICENSES_YAML: |
            - GPL-3.0
            - LGPL-3.0
            - MIT
            - BSD
            - Apache-2.0
            - ISC
            - MPL-2.0
            - CC0-1.0
            - BlueOak-1.0.0
            - Python-2.0
        run: |
          chmod +x ./check_license_compatibility.sh
          COMPATIBLE_LICENSES=$(echo "$COMPATIBLE_LICENSES_YAML" | yq e '.[]' - | paste -sd'|' -)
          ./check_license_compatibility.sh go-licenses.csv "$COMPATIBLE_LICENSES" go
          ./check_license_compatibility.sh npm-licenses.csv "$COMPATIBLE_LICENSES" npm
